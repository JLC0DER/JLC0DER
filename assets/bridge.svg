<svg width="880" height="200" viewBox="0 0 880 200" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0c12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b222c"/>
      <stop offset="1" stop-color="#13191f"/>
    </linearGradient>
    <linearGradient id="aiNode" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2738"/>
      <stop offset="1" stop-color="#161d2a"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#7c93e8"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="879" height="199" rx="16" fill="url(#bg)" stroke="#222a35"/>
  <text x="32" y="36" font-size="11" letter-spacing="2.5" fill="#6e7681" font-weight="700">01 · THE BRIDGE</text>

  <!-- arrows -->
  <line x1="198" y1="116" x2="250" y2="116" stroke="#7c93e8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="414" y1="116" x2="466" y2="116" stroke="#7c93e8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="630" y1="116" x2="682" y2="116" stroke="#7c93e8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Business -->
  <rect x="40" y="80" width="150" height="72" rx="12" fill="url(#node)" stroke="#2b3340"/>
  <text x="115" y="112" text-anchor="middle" font-size="18" font-weight="600" fill="#e6edf3">Business</text>
  <text x="115" y="132" text-anchor="middle" font-size="10.5" letter-spacing="1.5" fill="#6e7681" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">STRATEGY</text>

  <!-- UX -->
  <rect x="256" y="80" width="150" height="72" rx="12" fill="url(#node)" stroke="#2b3340"/>
  <text x="331" y="112" text-anchor="middle" font-size="18" font-weight="600" fill="#e6edf3">UX</text>
  <text x="331" y="132" text-anchor="middle" font-size="10.5" letter-spacing="1.5" fill="#6e7681" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">EXPERIENCE</text>

  <!-- AI (highlight) -->
  <rect x="472" y="80" width="150" height="72" rx="12" fill="url(#aiNode)" stroke="url(#accent)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="547" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">AI</text>
  <text x="547" y="132" text-anchor="middle" font-size="10.5" letter-spacing="1.5" fill="#8aa9ff" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">INTELLIGENCE</text>

  <!-- Engineering -->
  <rect x="688" y="80" width="150" height="72" rx="12" fill="url(#node)" stroke="#2b3340"/>
  <text x="763" y="112" text-anchor="middle" font-size="18" font-weight="600" fill="#e6edf3">Engineering</text>
  <text x="763" y="132" text-anchor="middle" font-size="10.5" letter-spacing="1.5" fill="#6e7681" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">SYSTEMS</text>
</svg>
